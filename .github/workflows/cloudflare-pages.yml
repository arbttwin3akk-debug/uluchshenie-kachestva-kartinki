# Повторный деплой на Cloudflare Pages при push в main.
# Один раз в настройках репозитория: Settings → Secrets → CLOUDFLARE_API_TOKEN
# (Workers & Pages → API Tokens → Create with Edit Cloudflare Workers шаблон)
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx wrangler pages deploy . --project-name=pro-it-tehnologii
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
