# Cloudflare Pages — без VPN часто не открывается; основной вход см. GitHub Pages workflow.
# Секрет CLOUDFLARE_API_TOKEN — по желанию; без него job пропускается.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx wrangler pages deploy . --project-name=uluchshenie-kachestva-kartinki
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
