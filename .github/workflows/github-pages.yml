# Зеркало сайта на GitHub Pages — обычно открывается без VPN
# Один раз: Settings → Pages → Build: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "**.css"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-korrekciya-fotografiy
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static bundle
        run: |
          mkdir -p _site
          cp -f batch.html 404.html styles.css _site/
          touch _site/.nojekyll
          ls -la _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
